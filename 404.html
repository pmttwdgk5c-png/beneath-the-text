<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not found · Beneath the Text</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,900;1,9..144,400&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root{--parchment:#E5E1D4;--ink:#221F18;--ink-faded:#565041;--madder:#9F3A30;--madder-deep:#7F2E27;--rule:#C9C2B0;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--parchment);color:var(--ink);font-family:"EB Garamond",Georgia,serif;font-size:19px;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
  .center{text-align:center;max-width:36ch;}
  h1{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(2rem,6vw,4rem);line-height:1.02;margin:0 0 1rem;letter-spacing:-.02em;}
  p{color:var(--ink-faded);margin:0 0 1.5rem;}
  a{display:inline-block;font-family:"IBM Plex Mono",monospace;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--madder-deep);text-decoration:none;border:1px solid var(--rule);padding:.7rem 1.2rem;border-radius:2px;transition:border-color .2s;}
  a:hover{border-color:var(--madder);}
</style>
</head>
<body>
<div class="center">
  <h1>Page not found.</h1>
  <p>The page you're looking for isn't here. But the questions are.</p>
  <a href="/">← Back to the eleven questions</a>
</div>
</body>
</html>
